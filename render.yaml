# Deploy the API to Render from the same GitHub repo (Blueprint).
# https://render.com/docs/blueprint-spec
#
# Manual Web Service (not from blueprint): root = repo root, build = npm ci, start = node server/index.js
# Do NOT use src/server.js — the API entry file is server/index.js
#
# After the first deploy, open the Render service → Environment and set the secrets
# marked sync: false (Stripe + Supabase service role). Those cannot live in GitHub.

services:
  - type: web
    name: streamengine-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm ci
    startCommand: node server/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NODE_ENV
        value: production
      - key: APP_URL
        value: https://streamengineinc.com,https://streamenginev1.netlify.app
      - key: CORS_ALLOW_ORIGINS
        value: https://streamengineinc.com,https://streamenginev1.netlify.app
      - key: SPOTIFY_CLIENT_ID
        value: a689918def2f448e9632819a8ec289cd
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        value: https://rltejlyhvhlivskbezkx.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SUBSCRIPTION_PRICE_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
