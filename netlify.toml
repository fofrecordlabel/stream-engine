# Netlify reads this from GitHub. UI env vars override these when the same key exists.
# Recommended in Netlify → Environment variables (build + runtime for Vite):
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, VITE_STRIPE_PUBLISHABLE_KEY, VITE_SPOTIFY_CLIENT_ID
# Spotify: use VITE_SPOTIFY_CLIENT_ID for the site (Vite only exposes VITE_*). A bare SPOTIFY_CLIENT_ID in the Netlify UI does nothing for the React bundle — copy the same value into VITE_SPOTIFY_CLIENT_ID or rely on the default below + src/lib/env.js DEFAULT_SPOTIFY_CLIENT_ID.
# Plus either set VITE_APP_URL / VITE_API_ORIGIN here or in the UI.
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Spotify Client ID (public; shipped in the browser bundle).
  VITE_SPOTIFY_CLIENT_ID = "a689918def2f448e9632819a8ec289cd"
  # Your Netlify site (Stripe success/cancel + OAuth redirect). Edit if the site name changes.
  VITE_APP_URL = "https://streamenginev1.netlify.app"
  # Must match the URL of your deployed Express API (see render.yaml → service name).
  VITE_API_ORIGIN = "https://streamengine-api.onrender.com"
  # Supabase project (public ref — safe in repo). Anon key still required: set VITE_SUPABASE_ANON_KEY below or in Netlify UI.
  VITE_SUPABASE_URL = "https://rltejlyhvhlivskbezkx.supabase.co"

# Proxy API to Render so the browser can use same-origin `/api/*` (fixes Spotify metadata + checkout on Netlify).
# Must appear before the SPA catch-all. Change the host if your API service URL differs.
[[redirects]]
  from = "/api/*"
  to = "https://streamengine-api.onrender.com/api/:splat"
  status = 200
  force = true

# SPA: client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# If the Netlify build still shows demo mode, add under [build.environment] (anon key is public in the client):
# VITE_SUPABASE_ANON_KEY = "eyJhbG..."
# VITE_STRIPE_PUBLISHABLE_KEY = "pk_live_..."
